# Keep-alive for the pooled Supabase free-tier projects. Supabase free projects
# pause after ~7 days idle, which would leave the deployed demo unable to create
# leads. A trivial ~3-day query resets the idle timer. psql is preinstalled on
# GitHub-hosted ubuntu runners.
#
# Covers BOTH shared portfolio pooling projects so neither falls asleep:
#   - KEEPALIVE_DATABASE_URL   (required) -> portafolio-45-project-a (schema rv_crm lives here)
#   - KEEPALIVE_DATABASE_URL_B (optional) -> portafolio-45-project-b (skipped if unset)
# Set them in repo Settings -> Secrets and variables -> Actions.
#
# HONEST LIMIT: GitHub disables scheduled workflows after 60 days of *repository*
# inactivity (scheduled runs themselves do NOT count as activity). If this repo
# sits fully idle for 60+ days the cron is auto-disabled and the DBs can pause.
# Mitigation: push a commit or run this workflow manually (workflow_dispatch) at
# least every ~50 days, or move the ping to an external scheduler.
name: keep-alive

on:
  schedule:
    # Every 3 days at 06:17 UTC - comfortably inside the ~7-day idle window.
    - cron: "17 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping project-a (required)
        env:
          URL: ${{ secrets.KEEPALIVE_DATABASE_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::KEEPALIVE_DATABASE_URL is not set - project-a will pause after ~7 days idle."
            exit 1
          fi
          psql "$URL" -tAc "select 1;"
          echo "project-a keep-alive OK."

      - name: Ping project-b (optional)
        env:
          URL: ${{ secrets.KEEPALIVE_DATABASE_URL_B }}
        run: |
          if [ -z "$URL" ]; then
            echo "KEEPALIVE_DATABASE_URL_B not set - skipping project-b."
            exit 0
          fi
          psql "$URL" -tAc "select 1;"
          echo "project-b keep-alive OK."
